allow_remote_control yes

notify_on_cmd_finish invisible 20


# -------------------------------------------------
# Window behavior
# -------------------------------------------------
hide_window_decorations yes
confirm_os_window_close 0

# -------------------------------------------------
# Font
# -------------------------------------------------
font_family      FiraCode Nerd Font
font_size        11.5

# -------------------------------------------------
# Spacing
# -------------------------------------------------
window_padding_width 8

# -------------------------------------------------
# Cursor
# -------------------------------------------------
cursor            #cdd6f4
cursor_text_color #1e1e2e

# -------------------------------------------------
# Selection
# -------------------------------------------------
selection_background #45475a
selection_foreground #cdd6f4

# -------------------------------------------------
# Bell
# -------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# -------------------------------------------------
# Scrollback
# -------------------------------------------------
scrollback_lines 10000

# -------------------------------------------------
# Background / Foreground (Catppuccin Mocha)
# -------------------------------------------------
background #1e1e2e
foreground #cdd6f4



# -------------------------------------------------
# ANSI Colors (Catppuccin Mocha)
# -------------------------------------------------

# Black
color0  #45475a
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #cba6f7
color13 #cba6f7

# Cyan
color6  #94e2d5
color14 #94e2d5

# White
color7  #bac2de
color15 #cdd6f4

