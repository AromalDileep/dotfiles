include current-theme.conf

# Font
font_family      JetBrains Mono Nerd Font
font_size 11.0

# Cursor
cursor_shape beam
cursor_trail 1

# Padding
window_margin_width 5

# No stupid close confirmation
confirm_os_window_close 0

# kitty tab looks
tab_bar_style powerline
tab_powerline_style round 

# Allow kitty remote control
allow_remote_control yes

# Use custom tab titles
tab_title_template "{title}"

# Copy
map ctrl+c    copy_or_interrupt

# Search
map ctrl+f    launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

# --- NEW: VIM MOTIONS & SPLITS LAYOUT ---

# 1. Enable the splits layout (Required for directional commands)
enabled_layouts splits,stack

# 2. Navigation: Move focus between panes (Vim Style)
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# 3. Creation: Split windows in specific directions (Vim Style)
# Split Down (Horizontal)
map ctrl+shift+alt+j launch --location=hsplit --cwd=current
# Split Right (Vertical)
map ctrl+shift+alt+l launch --location=vsplit --cwd=current

# 4. Movement: Swap window positions (Vim Style)
map ctrl+shift+alt+h move_window left
map ctrl+shift+alt+k move_window up

# --- END OF VIM MOTIONS ---

# Open new window (Default split behavior)
map f2 new_window_with_cwd
# Opens new tab in same directory
map f1 new_tab_with_cwd
tab_bar_filter session:~ or session:^$

# Aesthetics
hide_window_decorations yes
background_opacity    0.92
background_blur       20
dynamic_background_opacity yes
