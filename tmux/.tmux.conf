# Enable mouse support
set -g mouse on
# Use vi keybindings in copy mode
setw -g mode-keys vi
# Enable clipboard integration
set-option -g set-clipboard on
# Change prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
# Keyboard copy → system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
# Mouse copy → system clipboard
bind -T copy-mode-vi MouseDragEnd1Pane \
  send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode MouseDragEnd1Pane \
  send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
# Reload config with prefix + r
unbind r
bind r source-file ~/.tmux.conf 
# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
# Resize panes with UPPERCASE H, J, K, L
# The -r flag makes these repeatable
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# Start window numbering at 1
set -g base-index 1 
# Start pane numbering at 1
set -g pane-base-index 1
# Status bar styling
set -g status-style bg=default,fg=black,bright
set -g status-left "#[fg=cyan,bright] #S #[fg=white]|  "
set -g status-left-length 100
set -g status-right "#[fg=cyan,bright]%I:%M %p #[fg=white]| #[fg=cyan,bright]%d-%b-%y"
# Move status bar to top
set -g status-position top
# Pane separators
set -g pane-border-lines simple
# Window status indicators
set -g window-status-format "#I:#W"
set -g window-status-style "fg=cyan,bright"
set -g window-status-current-format " #I:#W"
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta,nobold}"
set -g window-status-bell-style "fg=red,nobold" 
# Renumber windows when one is closed
set -g renumber-windows on
# Remove escape key delay
set -g escape-time 0
# Repeat time for commands
set -g repeat-time 1000
# Scrollback history limit
set -g history-limit 10000
# Split panes with | and -
bind \\ split-window -h
bind - split-window -v
unbind '"'
unbind %
# Command line message styling
set -g message-style "fg=cyan,bg=default,bright"
# Copy mode and selection styling
set -g mode-style "fg=black,bg=cyan,bright"
# Display Popups  
bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"
bind C-n display-popup -w 40 -h 3 -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'
bind c display-popup -w 40 -h 3 -E 'bash -i -c "read -p \"Window name: \" name; tmux new-window -n \"\$name\""'
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"
# Display Menu 
bind d display-menu -T "#[align=centre]Dotfiles" -x C -y C \
  ".zshrc"            z  "display-popup -w 60% -h 90% -E 'nvim ~/.dotfiles/zsh/.zshrc'" \
  ".tmux.conf"        t  "display-popup -w 60% -h 90% -E 'nvim ~/.dotfiles/tmux/.tmux.conf'" \
  "kitty.conf"        k  "display-popup -w 60% -h 90% -E 'nvim ~/.dotfiles/kitty/.config/kitty/kitty.conf'" \
  "starship.toml"     s  "display-popup -w 60% -h 90% -E 'nvim ~/.dotfiles/starship/.config/starship.toml'" \
  ".gitconfig"        g  "display-popup -w 60% -h 90% -E 'nvim ~/.dotfiles/git/.gitconfig'" \
  ".ideavimrc"        i  "display-popup -w 60% -h 90% -E 'nvim ~/.dotfiles/ideavim/.ideavimrc'" \
  "Exit"              q  ""
