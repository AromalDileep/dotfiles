"$schema" = "https://starship.rs/config-schema.json"
palette = "catppuccin_mocha"

format = """
[╭─](fg:surface2)\
$python\
$conda\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$cmd_duration\
$fill\
[─╮](fg:surface2)
[╰─](fg:surface2)$character
"""

# ------------------------
# Fill - extends to terminal width
# ------------------------
[fill]
symbol = "─"
style = "fg:surface2"

# ------------------------
# Directory
# ------------------------
[directory]
format = "[ $path]($style) "
style = "fg:blue"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

# ------------------------
# Character
# ------------------------
[character]
success_symbol = "[❯](bold fg:mauve)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:green)"

# ------------------------
# Git
# ------------------------
[git_branch]
format = "[ $branch]($style) "
style = "fg:mauve"
symbol = ""

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "fg:overlay1"

[git_status]
style = "fg:teal"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "[ ${count}](fg:red)"
ahead = "[ ${count}](fg:green)"
behind = "[ ${count}](fg:peach)"
diverged = "[ ${ahead_count} ${behind_count}](fg:yellow)"
untracked = "[ ${count}](fg:yellow)"
stashed = "[ ${count}](fg:sapphire)"
modified = "[ ${count}](fg:peach)"
staged = "[󰜘 ${count}](fg:green)"
renamed = "[ ${count}](fg:sky)"
deleted = "[ ${count}](fg:red)"

[git_metrics]
disabled = false
added_style = "fg:green"
deleted_style = "fg:red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

# ------------------------
# Command Duration
# ------------------------
[cmd_duration]
format = "[󱦟 $duration]($style) "
style = "fg:peach"
min_time = 1000

# ------------------------
# Python (virtualenv ONLY)
# ------------------------
[python]
disabled = false
format = "[ $virtualenv]($style) "
style = "fg:sky"
symbol = ""
detect_extensions = []
detect_files = []
detect_folders = []
python_binary = []

# ------------------------
# Conda
# ------------------------
[conda]
disabled = false
format = "[ $environment]($style) "
style = "fg:sapphire"
symbol = ""
ignore_base = false

# ------------------------
# Additional modules
# ------------------------
[nodejs]
format = "[ $version]($style) "
style = "fg:green"
symbol = ""

[rust]
format = "[ $version]($style) "
style = "fg:peach"
symbol = ""

[golang]
format = "[ $version]($style) "
style = "fg:sky"
symbol = ""

[docker_context]
format = "[ $context]($style) "
style = "fg:blue"
symbol = ""

# ------------------------
# Catppuccin Mocha Palette
# ------------------------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
