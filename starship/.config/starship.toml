"$schema" = "https://starship.rs/config-schema.json"
palette = "catppuccin_mocha"

format = """
[‚ï≠‚îÄ](fg:surface2)\
$python\
$conda\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$fill\
[‚îÄ‚ïÆ](fg:surface2)
[‚ï∞‚îÄ](fg:surface2)$status$character
"""

# ------------------------
# Fill - extends to terminal width
# ------------------------
[fill]
symbol = "‚îÄ"
style = "fg:surface2"

# ------------------------
# Directory
# ------------------------
[directory]
format = "[ $path]($style) "
style = "fg:blue"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "‚Ä¶/"

# ------------------------
# Character
# ------------------------
[character]
success_symbol = "[‚ùØ](bold fg:mauve)"
error_symbol = "[‚ùØ](bold fg:red)"
vimcmd_symbol = "[‚ùÆ](bold fg:green)"

# ------------------------
# Status (shows error indicator)
# ------------------------
[status]
disabled = false
format = "[‚úó $status]($style) "
style = "fg:red"
success_symbol = ""

# ------------------------
# Git
# ------------------------
[git_branch]
format = "[ $branch]($style) "
style = "fg:mauve"
symbol = ""

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "fg:overlay1"

[git_status]
style = "fg:teal"
format = "[$modified$staged$untracked$renamed$deleted$conflicted$ahead_behind$stashed]($style) "
modified = "*"
staged = "+"
untracked = "?"
renamed = "¬ª"
deleted = "‚úò"
conflicted = "!"
stashed = "‚â°"
ahead = "‚á°"
behind = "‚á£"
diverged = "‚áï"

# ------------------------
# Command Duration
# ------------------------
[cmd_duration]
format = "[Û±¶ü $duration]($style) "
style = "fg:peach"
min_time = 1000

# ------------------------
# Python (virtualenv ONLY)
# ------------------------
[python]
disabled = false
format = "[ $virtualenv]($style) "
style = "fg:sky"
symbol = ""
detect_extensions = []
detect_files = []
detect_folders = []
python_binary = []

# ------------------------
# Conda
# ------------------------
[conda]
disabled = false
format = "[ $environment]($style) "
style = "fg:sapphire"
symbol = ""
ignore_base = false

# ------------------------
# Additional modules
# ------------------------
[nodejs]
format = "[ $version]($style) "
style = "fg:green"
symbol = ""

[rust]
format = "[ $version]($style) "
style = "fg:peach"
symbol = ""

[golang]
format = "[ $version]($style) "
style = "fg:sky"
symbol = ""

[docker_context]
format = "[ $context]($style) "
style = "fg:blue"
symbol = ""

# ------------------------
# Catppuccin Mocha Palette
# ------------------------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
