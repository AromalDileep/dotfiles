format = """
[ ](#7AA2F7)\
$conda\
[](bg:#BB9AF7 fg:#7AA2F7)\
$python\
[](bg:#7DCFFF fg:#BB9AF7)\
$username\
[](bg:#E0AF68 fg:#7DCFFF)\
$directory\
[](bg:#9ECE6A fg:#E0AF68)\
$git_branch\
$git_status\
[](bg:#F7768E fg:#9ECE6A)\
$cmd_duration\
[](bg:#7AA2F7 fg:#F7768E)\
$c\
$cpp\
$golang\
$haskell\
$java\
$nodejs\
$r\
[ ](fg:#7AA2F7)
"""
add_newline = true
# ------------------------------------
# Conda
# ------------------------------------
[conda]
symbol = "🅒 "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ $symbol$environment ]($style)"
ignore_base = false
# ------------------------------------
# Username
# ------------------------------------
[username]
show_always = true
style_user = "bg:#7DCFFF fg:#1a1b26"
style_root = "bg:#7DCFFF"
format = "[$user ]($style)"
disabled = false
# ------------------------------------
# Directory
# ------------------------------------
[directory]
style = "bg:#E0AF68 fg:#1a1b26"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# ------------------------------------
# Git
# ------------------------------------
[git_branch]
symbol = ""
style = "bg:#9ECE6A fg:#1a1b26"
format = "[ $symbol $branch ]($style)"
[git_status]
style = "bg:#9ECE6A fg:#F7768E"
format = "[$all_status$ahead_behind ]($style)"
# ------------------------------------
# Command Duration
# ------------------------------------
[cmd_duration]
disabled = false
min_time = 2000
style = "bg:#F7768E fg:#1a1b26"
format = "[ Took $duration! ]($style)"
# ------------------------------------
# Languages
# ------------------------------------
[c]
symbol = "C "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ $symbol($version(-$name)) ]($style)"
disabled = true
[cpp]
symbol = " "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ $symbol($version(-$name)) ]($style)"
disabled = false
[golang]
symbol = " "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ $symbol($version) ]($style)"
disabled = false
[haskell]
symbol = "󰲒 "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ $symbol($version) ]($style)"
disabled = false
[java]
symbol = " "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ ${symbol}(${version}) ]($style)"
disabled = true
[nodejs]
symbol = " "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ $symbol($version) ]($style)"
disabled = false
[rust]
symbol = " "
style = "bg:#7AA2F7 fg:#1a1b26"
format = "[ $symbol($version) ]($style)"
disabled = false
# ------------------------------------
# Python Venv (Only displays name)
# ------------------------------------
[python]
disabled = false
symbol = ""
style = "bg:#BB9AF7 fg:#1a1b26"
format = "[ $virtualenv ]($style)"
pyenv_version_name = false
python_binary = []
detect_extensions = []
detect_folders = []
version_format = ""
